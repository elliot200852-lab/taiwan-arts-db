        version: original
    note: 陳明章 1993 年受勵馨基金會之邀為「拯救雛妓」活動創作，後成為 2004 年「二二八百萬人手牽手護台灣」等社會運動最常合唱的歌。listen 為陳明章官方頻道《台灣的囡仔歌》專輯的後年重錄版，非 1993 首版。
    sources:
      - 〈伊是咱的寶貝〉創作緣起、勵馨基金會、社會運動傳唱：https://zh.wikipedia.org/zh-tw/%E4%BC%8A%E6%98%AF%E5%92%B1%E7%9A%84%E5%AF%B6%E8%B2%9D

