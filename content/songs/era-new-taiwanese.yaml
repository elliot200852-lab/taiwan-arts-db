songs:
  - id: bin-tsu-a-tshau
    title: 民主阿草
    year: 1989
    era: era-new-taiwanese
    language: 台語
    credits:
      original_singer: 黑名單工作室
    hook: 解嚴後黑名單工作室的抗議之作，被稱台灣最後一首禁歌。
    listen:
      - url: https://www.youtube.com/watch?v=YHrLnLg53tQ
        label: 黑名單工作室原唱（YouTube 官方 Topic 頻道）
        source_type: official
        version: original
    banned: 解嚴已兩年，新聞局雖核准歌詞，卻通知全國電台不得宣傳播放，一般視為台灣最後一首受官方壓制的禁歌。
    note: 收錄於黑名單工作室 1989 年專輯《抓狂歌》（滾石／真言社），全台語演唱，融合搖滾與饒舌，開創新台語歌運動。
    sources:
      - 《抓狂歌》發行、全台語、新台語歌運動：https://zh.wikipedia.org/zh-tw/%E6%8A%93%E7%8B%82%E6%AD%8C
      - 〈民主阿草〉禁歌史（新聞局暗中封殺）：https://storystudio.tw/article/gushi/black-list

  - id: hiong-tsian-tsau
    title: 向前走
    year: 1990
    era: era-new-taiwanese
    language: 台語
    credits:
      lyricist: 林強
      composer: 林強
      original_singer: 林強
    hook: 林強把台語歌從悲情改寫成北上打拚的進行曲。
    listen:
      - url: https://www.youtube.com/watch?v=gD14iiXq7Xw
        label: 林強原唱（滾石唱片官方頻道）
        source_type: official
        version: original
    note: 林強 1990 年首張台語專輯《向前走》，賣出四十多萬張，MV 拍於台北車站，唱外地青年北上打拚，是新台語歌運動的代表作。
    sources:
      - 《向前走》發行、銷量、火車與北上意象：https://zh.wikipedia.org/zh-tw/%E5%90%91%E5%89%8D%E8%B5%B0
      - 〈向前走〉與九〇年代島國集體欲望：https://www.verse.com.tw/article/chorus-10-limgiong

