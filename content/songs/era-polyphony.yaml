        version: original
    note: 收錄於阿爆（阿仍仍）2019 年排灣語專輯《kinakaian 母親的舌頭》，該專輯獲第 31 屆金曲獎最佳原住民語專輯與年度專輯。本曲並用排灣語與英語。
