songs:
  - id: hai-yang
    title: 海洋
    year: 1999
    era: era-polyphony
    language: 國語
    credits:
      lyricist: 陳建年
      composer: 陳建年
      original_singer: 陳建年
    hook: 台東的警察陳建年以這張專輯拿下二〇〇〇年金曲歌王。
    listen:
      - url: https://www.youtube.com/watch?v=zDjRtY0xqr0
        label: 陳建年原唱（角頭音樂官方頻道）
        source_type: official
        version: original
    note: 專輯《海洋》1999 年底發行，2000 年獲第 11 屆金曲獎最佳國語男演唱人。發表年跨在世紀之交，本庫依 SONGS-SPEC 候選名冊將其列入眾聲喧嘩期，以其 2000 年獲獎與影響為錨。
    sources:
      - 陳建年生平、卑南族南王部落出身、以《海洋》獲 2000 年金曲歌王時仍為警察：https://zh.wikipedia.org/zh-tw/%E9%99%B3%E5%BB%BA%E5%B9%B4_(%E6%AD%8C%E6%89%8B)
      - 官方 MV（收錄專輯、演唱者、角頭音樂編號 TCM003）：https://www.youtube.com/watch?v=zDjRtY0xqr0

  - id: da-di-qing-huai
    title: 大地情懷
    year: 2002
    era: era-polyphony
    language: 國語
    credits:
      lyricist: 陳建年
      composer: 陳建年
      original_singer: 陳建年
    hook: 陳建年唱台東的山與海，把部落的從容寫進旋律。
    listen:
      - url: https://www.youtube.com/watch?v=nnkcSJla5zw
        label: 陳建年原唱（角頭音樂官方頻道）
        source_type: official
        version: original
    note: 收錄於陳建年 2002 年專輯《大地》（角頭音樂 TCM020）。
    sources:
      - 官方 MV（收錄專輯、演唱者、角頭音樂編號 TCM020）：https://www.youtube.com/watch?v=nnkcSJla5zw
      - 陳建年生平與創作：https://zh.wikipedia.org/zh-tw/%E9%99%B3%E5%BB%BA%E5%B9%B4_(%E6%AD%8C%E6%89%8B)

  - id: ye-huo
    title: 野火
    year: 2001
    era: era-polyphony
    language: 國語
    credits:
      original_singer: 紀曉君
    hook: 卑南族的紀曉君從古謠走進流行，唱出新世代的原住民聲音。
    listen:
      - url: https://www.youtube.com/watch?v=PTcgTJF97Og
        label: 紀曉君原唱（滾石唱片官方頻道）
        source_type: official
        version: original
    note: 收錄於紀曉君 2001 年專輯《野火 春風》。紀曉君為台東卑南族南王部落歌手，以吟唱古謠起家。詞曲作者史料未逐一查證，故 credits 僅列演唱者。
    sources:
      - 官方 MV（收錄專輯與演唱者）：https://www.youtube.com/watch?v=PTcgTJF97Og

  - id: tai-ping-yang-de-feng
    title: 太平洋的風
    year: 2005
    era: era-polyphony
    language: 國語
    credits:
      lyricist: 胡德夫
      composer: 胡德夫
      original_singer: 胡德夫
    hook: 胡德夫唱島嶼與海風，二〇〇六年拿下金曲最佳作詞。
    listen:
      - url: https://www.youtube.com/watch?v=1orwkijmkIU
        label: 胡德夫原唱（野火樂集官方頻道）
        source_type: official
        version: original
    note: 收錄於胡德夫 2005 年首張個人專輯《匆匆》。胡德夫為卑南族，民歌運動的先聲，隔了三十年才出第一張個人專輯。
    sources:
      - 官方 MV（收錄專輯與演唱者）：https://www.youtube.com/watch?v=1orwkijmkIU
      - 胡德夫生平與《匆匆》專輯：https://zh.wikipedia.org/zh-tw/%E8%83%A1%E5%BE%B7%E5%A4%AB

  - id: kiuk-fa-ya-hang-kiun
    title: 菊花夜行軍
    year: 2001
    era: era-polyphony
    language: 客語
    credits:
      lyricist: 鍾永豐
      composer: 林生祥
      original_singer: 交工樂隊
    hook: 交工樂隊為美濃反水庫而唱，把客家庄的心事寫成史詩。
    listen:
      - url: https://www.youtube.com/watch?v=yMbS0iIliqc
        label: 交工樂隊／生祥樂隊官方頻道・十五週年紀念影片
        source_type: official
        version: live
    note: 收錄於交工樂隊 2001 年同名專輯，錄於美濃菸樓，引入嗩吶與改造月琴。乾淨的錄音室版在合格頻道未見，改收樂團官方頻道（今名生祥樂隊）的十五週年紀念影片。林生祥以此專輯獲 2002 年金曲獎最佳樂團。
    sources:
      - 交工樂隊、美濃反水庫運動、《菊花夜行軍》專輯與金曲獎：https://zh.wikipedia.org/zh-hant/%E4%BA%A4%E5%B7%A5%E6%A8%82%E9%9A%8A
      - 官方頻道紀念影片（收錄專輯與演出者）：https://www.youtube.com/watch?v=yMbS0iIliqc

  - id: zung-shu
    title: 種樹
    year: 2006
    era: era-polyphony
    language: 客語
    credits:
      lyricist: 鍾永豐
      composer: 林生祥
      original_singer: 林生祥
    hook: 林生祥唱農人種樹，把對土地的想像唱回最前緣。
    listen:
      - url: https://www.youtube.com/watch?v=ryAPBKGIwmE
        label: 林生祥演唱（中華文化總會・2019 總統府音樂會）
        source_type: foundation
        version: live
    note: 收錄於林生祥 2006 年專輯《種樹》。錄音室版在合格頻道未見，改收 2019 年總統府音樂會現場版（中華文化總會官方上傳）。
    sources:
      - 林生祥與交工樂隊脈絡：https://zh.wikipedia.org/zh-hant/%E4%BA%A4%E5%B7%A5%E6%A8%82%E9%9A%8A
      - 現場演出（演唱者與曲目）：https://www.youtube.com/watch?v=ryAPBKGIwmE

  - id: amis
    title: 阿米斯
    year: 2012
    era: era-polyphony
    language: 族語（阿美）
    credits:
      lyricist: 舒米恩
      composer: 舒米恩
      original_singer: 舒米恩
    hook: 舒米恩以阿美語唱部落青年，讓族語重新登上舞台。
    listen:
      - url: https://www.youtube.com/watch?v=5pam-KLnqHU
        label: 舒米恩原唱（YouTube 官方 Topic 頻道）
        source_type: official
        version: original
    note: 收錄於舒米恩 2012 年阿美語專輯《阿米斯 AMIS》。舒米恩為台東都蘭部落阿美族創作歌手。
    sources:
      - 官方 Topic 頻道音檔（演唱者與曲目）：https://www.youtube.com/watch?v=5pam-KLnqHU

  - id: malikasaw
    title: 快樂搖擺
    year: 2012
    era: era-polyphony
    language: 族語（卑南）
    credits:
      original_singer: 桑布伊
    hook: 桑布伊以卑南語古調入歌，唱出土地與生命的力量。
    listen:
      - url: https://www.youtube.com/watch?v=OJAqwpdvFCQ
        label: 桑布伊原唱（Sangpuy 官方頻道）
        source_type: official
        version: original
    note: 收錄於桑布伊 2012 年首張專輯《Dalan 路》。桑布伊為台東卑南族知本部落歌手，作品多取材傳統祭歌，詞曲多為傳統改編故 credits 僅列演唱者。
    sources:
      - 官方 MV（演唱者與專輯）：https://www.youtube.com/watch?v=OJAqwpdvFCQ

  - id: carefree-life
    title: 輕快的生活
    year: 2011
    era: era-polyphony
    language: 族語（阿美）
    credits:
      lyricist: 以莉·高露
      composer: 以莉·高露
      original_singer: 以莉·高露
    hook: 以莉·高露以阿美語唱日常，拿下金曲最佳原住民語專輯。
    listen:
      - url: https://www.youtube.com/watch?v=OMT9YutYMuU
        label: 以莉·高露原唱（風潮音樂官方頻道）
        source_type: official
        version: original
    note: 收錄於以莉·高露 2011 年專輯《輕快的生活》，獲第 23 屆金曲獎最佳原住民語專輯與最佳原住民語歌手。
    sources:
      - 官方 MV（演唱者、專輯、金曲獎）：https://www.youtube.com/watch?v=OMT9YutYMuU

  - id: ni-wa-wa
    title: 泥娃娃
    year: 2000
    era: era-polyphony
    language: 國語
    credits:
      original_singer: 巴奈
    hook: 巴奈把一首兒歌重新唱過，唱出漂泊與追問自己是誰。
    listen:
      - url: https://www.youtube.com/watch?v=sIh7ZvBHCQ4
        label: 巴奈原唱（角頭音樂官方頻道）
        source_type: official
        version: original
    note: 收錄於巴奈 2000 年首張專輯《泥娃娃》（角頭音樂 TCM008）。巴奈重新詮釋一首流傳已久的兒歌，唱法沉緩。巴奈為卑南與阿美族歌手。
    sources:
      - 官方 MV（演唱者、專輯、角頭音樂編號 TCM008）：https://www.youtube.com/watch?v=sIh7ZvBHCQ4

  - id: thank-you
    title: Thank You
    year: 2019
    era: era-polyphony
    language: 混合（排灣語／英語）
    credits:
      original_singer: 阿爆（阿仍仍）
    hook: 阿爆以排灣語專輯拿下金曲年度專輯，讓族語站上主流。
