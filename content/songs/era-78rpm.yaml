        label: 純純 1933 古倫美亞原版（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    note: 唱片編號日蓄（古倫美亞）80273，A 面為〈紅鶯之鳴〉。後為 2003 年郭珍弟同名紀錄片片名所本。
