        source_type: archive
        version: original
    note: 唱片編號日蓄（古倫美亞）80274，B 面即〈月夜愁〉。珈琲指類似酒吧、有女給陪侍的消費場所。
    sources:
      - 發行年、唱片編號、內容主題：https://audio.nmth.gov.tw/audio/%e7%8f%88%e7%90%b2%ef%bc%81%e7%8f%88%e7%90%b2%ef%bc%81/

