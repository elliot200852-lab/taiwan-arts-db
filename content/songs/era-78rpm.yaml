songs:
  - id: tho-hoe-khip-hoeh-ki
    title: 桃花泣血記
    year: 1932
    era: era-78rpm
    language: 台語
    credits:
      lyricist: 詹天馬
      composer: 王雲峰
      original_singer: 純純
    hook: 為上海默片在臺宣傳而寫，一般認定是臺灣第一首流行歌。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e6%a1%83%e8%8a%b1%e6%b3%a3%e8%a1%80%e8%a8%98/
        label: 許石編曲・太王管弦樂團復刻版（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: famous_cover
    note: 1932 年純純原唱曲盤現存數位檔多為個人上傳，本庫改收臺史博典藏之許石 1975 年復刻錄音。
    sources:
      - 臺灣第一首流行歌、電影宣傳曲來歷、詞曲作者：https://zh.wikipedia.org/zh-tw/%E6%A1%83%E8%8A%B1%E6%B3%A3%E8%A1%80%E8%A8%98
      - 典藏錄音、發行資訊：https://audio.nmth.gov.tw/audio/%e6%a1%83%e8%8a%b1%e6%b3%a3%e8%a1%80%e8%a8%98/

  - id: thiau-bu-si-tai
