  - id: you-shi-huang-hun
    title: 又是黃昏
    year: 1973
    era: era-mandarin
    language: 國語
    credits:
      original_singer: 余天
    hook: 「寶島歌王」余天群星會出身後的抒情名曲。
    listen:
      - url: https://www.youtube.com/watch?v=Kw8Rl1YmM6A
        label: 余天原唱（Yu Tien 官方 Topic 頻道）
        source_type: official
        version: original
