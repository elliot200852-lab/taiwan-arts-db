        source_type: official
        version: original
    note: 楊燕因此曲得「蘋果花歌后」之名，旋律改編自日本歌曲《蘋果追分》；發表年為概值。
    sources:
      - 楊燕「蘋果花歌后」、改編日本歌曲：https://zh.wikipedia.org/zh-tw/意難忘

  - id: shen-mi-nu-lang
