        source_type: official
        version: original
    note: 收於 1982 年首張專輯《之乎者也》，歌詞探討臺灣經濟起飛後的社會劇烈變遷。
    sources:
      - 1982 年《之乎者也》、鹿港小鎮探討經濟起飛後社會變遷：https://zh.wikipedia.org/zh-tw/羅大佑

