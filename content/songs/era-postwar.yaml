        version: original
    note: 洪一峰作曲並演唱、葉俊麟作詞，是洪一峰、葉俊麟這對戰後台語歌黃金搭檔的名曲之一。
    sources:
      - 思慕的人詞曲、洪一峰作曲演唱：https://zh.wikipedia.org/zh-tw/%E6%80%9D%E6%85%95%E7%9A%84%E4%BA%BA

  - id: tam-sui-boo-sek
    title: 淡水暮色
    year: 1957
    era: era-postwar
    language: 台語
    credits:
      lyricist: 葉俊麟
      composer: 洪一峰
      original_singer: 洪一峰
    hook: 唱淡水黃昏山海與教堂鐘聲的抒情名曲。
    listen:
      - url: https://www.youtube.com/watch?v=dxZcjMF6HXw
        label: 洪一峰作曲並演唱（官方 Topic 頻道）
        source_type: official
