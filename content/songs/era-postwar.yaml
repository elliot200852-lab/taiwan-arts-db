    year: 1960
    era: era-postwar
    language: 台語
    credits:
      lyricist: 許正照
      composer: 吳晉淮
      original_singer: 吳晉淮
    hook: 吳晉淮親自作曲並演唱的台南關子嶺溫泉戀歌。
    listen:
      - url: https://www.youtube.com/watch?v=mua0qha5VDg
        label: 吳晉淮作曲並演唱（授權發行商 Topic 音檔）
        source_type: official
        version: original
    note: 1960年吳晉淮作曲並演唱、許正照作詞，唱台南關子嶺的溫泉山色與戀情，是吳晉淮返台後的代表作之一。
    sources:
      - 關仔嶺之戀詞曲、吳晉淮作曲演唱：https://zh.wikipedia.org/zh-tw/%E5%90%B3%E6%99%89%E6%B7%AE

  - id: ku-cheng-mian-mian
