songs:
  - id: lam-to-chi-ia
    title: 南都之夜
    year: 1946
    era: era-postwar
    language: 台語
    credits:
      lyricist: 鄭志峰
      composer: 許石
    hook: 戰後第一首全台熱唱的歌，原名〈新臺灣建設歌〉。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e5%8d%97%e9%83%bd%e4%b9%8b%e5%a4%9c-2/
        label: 許石作曲、南都之夜（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    note: 許石作曲的第一號作品，1946年發表，原名〈新臺灣建設歌〉，寄託文化工作者對戰後臺灣的批判與期許，後以鄭志峰作詞的愛情歌謠〈南都之夜〉流行，成為戰後第一首全台熱唱歌謠。當時有傳言翻唱自日本〈蘋果之歌〉，許石則說取材自地方歌仔改編。
    sources:
      - 許石第一號作品、1946發表、原名新臺灣建設歌、戰後第一首全台熱唱：https://audio.nmth.gov.tw/audio/%e5%8d%97%e9%83%bd%e4%b9%8b%e5%a4%9c-2/

  - id: an-peng-tui-siong-khek
    title: 安平追想曲
    year: 1951
    era: era-postwar
    language: 台語
    credits:
      lyricist: 陳達儒
      composer: 許石
    hook: 台南安平金小姐的哀婉傳說，許石聽老人講古譜成的名曲。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e5%ae%89%e5%b9%b3%e8%bf%bd%e6%83%b3%e6%9b%b2/
        label: 許石最早錄音版本（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    note: 許石名曲代表作。據許石1969年受訪，旋律得自他在台南任教時、於安平古堡聽當地老人講述的地方傳聞；陳達儒為填詞親到安平寶美樓聽故事，並揉入日本「長崎物語」情節，寫成浪漫的金小姐形象。此為最早錄音版本（許石中國錄音製片公司創業作）。
    sources:
      - 安平金小姐傳說、許石作曲、陳達儒作詞、最早錄音版：https://audio.nmth.gov.tw/audio/%e5%ae%89%e5%b9%b3%e8%bf%bd%e6%83%b3%e6%9b%b2/

  - id: lo-siann-na-hiang
    title: 鑼聲若響
    year: 1955
    era: era-postwar
    language: 台語
    credits:
      composer: 許石
    hook: 港邊分手的離情，與安平追想曲並列的許石譜曲代表作。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e9%91%bc%e8%81%b2%e8%8b%a5%e9%9f%bf-2/
        label: 許石作曲、鑼聲若響（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    note: 年份為概數。早期歌本原名「噫！鑼聲若響」，唱片製作時刪去感嘆詞。從岸上分離唱到離港出發，強烈的Blues節奏暗示海景與失落，被視為與〈安平追想曲〉並列的許石譜曲代表作。
    sources:
      - 許石譜曲代表作、原名噫鑼聲若響、Blues港歌：https://audio.nmth.gov.tw/audio/%e9%91%bc%e8%81%b2%e8%8b%a5%e9%9f%bf-2/

  - id: ia-poann-e-loo-teng
    title: 夜半的路燈
    year: 1955
    era: era-postwar
    language: 台語
    credits:
      lyricist: 周添旺
      composer: 許石
    hook: 探戈爵士曲風的都會流行歌，唱路燈下等待的惆悵。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e5%a4%9c%e5%8d%8a%e7%9a%84%e8%b7%af%e7%87%88/
        label: 許石作曲、周添旺作詞（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    note: 年份為概數。據說是許石在台南火車站等候女友（後來的太太鄭淑華）引起靈感而譜；以和聲小音階、小提琴獨奏開場、探戈爵士風格，是許石罕見的都會流行歌，歌詞為周添旺所作。
    sources:
      - 許石作曲、周添旺作詞、都會探戈爵士風：https://audio.nmth.gov.tw/audio/%e5%a4%9c%e5%8d%8a%e7%9a%84%e8%b7%af%e7%87%88/

  - id: ma-ma-goa-ia-chin-iong-kian
    title: 媽媽我也真勇健
    year: 1960
    era: era-postwar
    language: 台語
    credits:
      lyricist: 葉俊麟
      composer: 鄧雨賢
      original_singer: 紀露霞
    people: [deng-yu-hsien]
    hook: 文夏改編自鄧雨賢戰時日語軍歌，卻因原曲身分被禁而更紅。
    listen:
      - url: https://audio.nmth.gov.tw/audio/%e5%aa%bd%e5%aa%bd%e6%88%91%e4%b9%9f%e7%9c%9f%e5%8b%87%e5%81%a5/
        label: 葉俊麟作詞、紀露霞演唱電影插曲（國立臺灣歷史博物館・臺灣音聲一百年）
        source_type: archive
        version: original
    banned: 因原曲為1939年日本軍國歌曲〈鄉土部隊勇士から〉而遭禁，卻反而更為民眾傳唱。
    note: 原曲為1939年鄧雨賢作曲的軍國歌曲〈鄉土部隊勇士から〉（鄉土部隊勇士的來信），1960年文夏改編為台語歌〈媽媽我也真勇健〉，葉俊麟作詞、紀露霞演唱為電影插曲。是「歌被政治改寫又反被政治查禁」的雙重案例。
    sources:
      - 原曲鄧雨賢1939軍國歌、1960文夏改編、遭禁反更流行、紀露霞演唱：https://audio.nmth.gov.tw/audio/%e5%aa%bd%e5%aa%bd%e6%88%91%e4%b9%9f%e7%9c%9f%e5%8b%87%e5%81%a5/

  - id: bang-li-cha-kui
    title: 望你早歸
    year: 1946
    era: era-postwar
    language: 台語
    credits:
      lyricist: 那卡諾
      composer: 楊三郎
      original_singer: 紀露霞
    hook: 苦等遠人歸來的名曲，戰後盼離散親人平安的心聲。
    listen:
      - url: https://www.youtube.com/watch?v=bqMB-oP0QFg
        label: 林慧萍翻唱（Hui Ping Lin 官方 Topic 頻道）
        source_type: official
        version: famous_cover
    note: 楊三郎作曲、那卡諾作詞，1946年發表、紀露霞演唱傳唱最廣。歌詞唱苦等遠行的人歸來，戰後常被聯想為等待二二八事件與白色恐怖中離散、失蹤親人的心聲。原唱紀露霞版無官方頻道，此連結為林慧萍翻唱版。
    sources:
      - 望你早歸詞曲、發表年、戰後傳唱與時代聯想：https://zh.wikipedia.org/zh-tw/%E6%9C%9B%E4%BD%A0%E6%97%A9%E6%AD%B8

  - id: poo-phoa-bang
    title: 補破網
    year: 1948
    era: era-postwar
    language: 台語
    credits:
      lyricist: 李臨秋
      composer: 王雲峰
    hook: 「破網」諧音「破望」，唱戰後破碎的希望與修補。
    listen:
      - url: https://www.youtube.com/watch?v=P6fJmlAqOSg
        label: 鳳飛飛翻唱（Feng Fei Fei 官方 Topic 頻道）
        source_type: official
        version: famous_cover
    banned: 一說當局曾以歌詞太過灰暗為由，要求另加光明結局的第三段。
    note: 李臨秋作詞、王雲峰作曲，1948年發表。台語「網」與「望」諧音，補破網暗喻修補戰後破碎的希望，寫盡當時的困頓心境。此連結為鳳飛飛翻唱版（原唱無官方頻道）。
    sources:
      - 補破網詞曲、發表年、破網諧音破望、加寫第三段一說：https://zh.wikipedia.org/zh-tw/%E8%A3%9C%E7%A0%B4%E7%B6%B2

  - id: sio-bah-chang
    title: 燒肉粽
    year: 1949
    era: era-postwar
    language: 台語
    credits:
      lyricist: 張邱東松
      composer: 張邱東松
      定名演唱: 郭金發
    hook: 深夜叫賣肉粽的歌，唱戰後底層討生活的辛酸。
    listen:
      - url: https://www.youtube.com/watch?v=m45fUda0xP4
        label: 郭金發演唱（Kuo Chin-fa 官方 Topic 頻道）
        source_type: official
        version: famous_cover
    banned: 一度因描寫民生困苦、失業辛酸而被列為禁歌。
    note: 張邱東松詞曲，1949年發表，原名〈賣肉粽〉，寫一個讀過書的青年落魄到深夜沿街叫賣肉粽，反映戰後的失業與貧困。後郭金發改唱、定名〈燒肉粽〉成為傳唱經典，此連結即郭金發版。
    sources:
      - 燒肉粽詞曲、原名賣肉粽、反映戰後貧困、郭金發定名：https://zh.wikipedia.org/zh-tw/%E7%87%92%E8%82%89%E7%B2%BD

  - id: poe-te-m-thang-chhi-kim-hi
    title: 杯底不可飼金魚
    year: 1949
    era: era-postwar
    language: 台語
    credits:
      lyricist: 呂泉生
      composer: 呂泉生
    hook: 呂泉生寫的勸酒歌，暗喻族群乾杯和解、莫記舊仇。
    listen:
      - url: https://www.youtube.com/watch?v=jkwkJwm8DUk
        label: 鄭士嘉演唱・金韻獎版（滾石唱片 ROCK RECORDS 官方頻道）
        source_type: official
        version: famous_cover
    note: 1949年呂泉生詞曲。歌名意為勸人乾杯、莫留殘酒，藉勸酒寓意二二八後本省與外省族群和解、莫記舊仇。此連結為滾石金韻獎系列鄭士嘉演唱版（呂泉生原版與合唱版僅見個人／教會頻道）。
    sources:
      - 杯底不可飼金魚詞曲、1949、族群和解寓意：https://zh.wikipedia.org/zh-tw/%E6%9D%AF%E5%BA%95%E4%B8%8D%E5%8F%AF%E9%A3%BC%E9%87%91%E9%AD%9A

  - id: goan-na-phah-khui-sim-lai-e-mng-thang
    title: 阮若打開心內的門窗
    year: 1958
    era: era-postwar
    language: 台語
    credits:
      lyricist: 王昶雄
      composer: 呂泉生
    hook: 呂泉生與王昶雄合作，唱打開心窗迎向光明的溫暖。
    listen:
      - url: https://www.youtube.com/watch?v=6xBz0kD3lM0
        label: 江蕙演唱（Jody Chiang 官方 Topic 頻道）
        source_type: official
        version: famous_cover
    note: 1958年呂泉生作曲、王昶雄作詞，戰後台語藝術歌曲的代表，唱打開心內的門窗、迎向光明與希望。此連結為江蕙演唱版。
    sources:
      - 阮若打開心內的門窗詞曲、1958、藝術歌曲：https://zh.wikipedia.org/zh-tw/%E9%98%AE%E8%8B%A5%E6%89%93%E9%96%8B%E5%BF%83%E5%85%A7%E7%9A%84%E9%96%80%E7%AA%97

  - id: kang-too-ia-hoo
    title: 港都夜雨
    year: 1951
    era: era-postwar
    language: 台語
    credits:
      lyricist: 呂傳梓
      composer: 楊三郎
    hook: 高雄港邊的夜雨與離愁，戰後港歌的代表。
    listen:
      - url: https://www.youtube.com/watch?v=BehAmVQUEvg
        label: 江蕙演唱（Jody Chiang 官方 Topic 頻道）
        source_type: official
        version: famous_cover
      - url: https://www.youtube.com/watch?v=RdhyvVSS2U4
        label: 黃鶯鶯翻唱（Tiger Huang 官方 Topic 頻道）
        source_type: official
        version: famous_cover
    note: 楊三郎作曲、呂傳梓作詞，1951年發表。以Blues節奏描寫港都夜雨中的離情與漂泊，是戰後「港歌」的代表作。原唱版無官方頻道，此收江蕙、黃鶯鶯兩個官方翻唱版。
    sources:
      - 港都夜雨詞曲、1951、港歌代表：https://zh.wikipedia.org/zh-tw/%E6%B8%AF%E9%83%BD%E5%A4%9C%E9%9B%A8

  - id: koan-a-nia-chi-loan
