    year: 1959
    era: era-postwar
    language: 台語
    credits:
      lyricist: 葉俊麟
      composer: 洪一峰
      original_singer: 洪一峰
    hook: 「寶島歌王」洪一峰的招牌情歌，纏綿悱惻的舊日戀情。
    listen:
      - url: https://www.youtube.com/watch?v=jvaFYeZZ63Q
        label: 洪一峰作曲並演唱（官方 Topic 頻道）
        source_type: official
