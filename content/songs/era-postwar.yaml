    note: 葉俊麟 1956 年作詞、洪一峰 1959 年譜曲並演唱，是「寶島歌王」洪一峰最著名的代表作；1962 年改編為同名電影、洪一峰主演。
    sources:
      - 1956 年葉俊麟作詞、1959 年洪一峰譜曲：https://zh.wikipedia.org/zh-tw/%E6%B4%AA%E4%B8%80%E5%B3%B0
      - 舊情綿綿詞曲與 1962 年同名電影：https://zh.wikipedia.org/zh-tw/%E8%88%8A%E6%83%85%E7%B6%BF%E7%B6%BF

  - id: su-boo-e-lang
    title: 思慕的人
    year: 1961
    era: era-postwar
    language: 台語
    credits:
      lyricist: 葉俊麟
      composer: 洪一峰
      original_singer: 洪一峰
    hook: 洪一峰低沉嗓音唱盡對心上人的深深思念。
    listen:
      - url: https://www.youtube.com/watch?v=pZrUtHVnQdM
