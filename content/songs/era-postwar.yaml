    note: 1957年洪一峰作曲並演唱、葉俊麟作詞，描寫淡水黃昏的山、海、教堂與渡船，是洪一峰的抒情代表作。
    sources:
      - 淡水暮色詞曲、洪一峰作曲演唱、代表作：https://zh.wikipedia.org/zh-tw/%E6%B4%AA%E4%B8%80%E5%B3%B0

  - id: hong-hun-e-koo-hiong
    title: 黃昏的故鄉
    year: 1958
    era: era-postwar
    language: 台語
    credits:
      lyricist: 文夏
      composer: 中野忠晴
      original_singer: 文夏
    hook: 日本旋律填台語詞的「混血歌」，遊子對故鄉的呼喚。
    listen:
      - url: https://www.youtube.com/watch?v=bR0aWg3d_n0
        label: 文夏演唱（官方 Topic 頻道）
        source_type: official
        version: original
    note: 混血歌——旋律取自日本歌曲（中野忠晴曲），文夏以筆名「愁人」填台語詞並演唱，1958年風行。因思鄉意涵，戒嚴時期在海外台灣同鄉間廣為傳唱，帶有濃厚的離散情感。
    sources:
      - 黃昏的故鄉為日曲台詞混血歌、文夏填詞演唱、1958：https://zh.wikipedia.org/zh-tw/%E9%BB%83%E6%98%8F%E7%9A%84%E6%95%85%E9%84%89

  - id: ma-ma-chhiann-li-ia-po-tiong
    title: 媽媽請你也保重
    year: 1958
    era: era-postwar
    language: 台語
    credits:
      lyricist: 文夏
      original_singer: 文夏
    hook: 日曲台詞的混血歌，離鄉遊子對母親的掛念與保重。
    listen:
      - url: https://www.youtube.com/watch?v=O23DdAcgxo4
        label: 文夏演唱（官方 Topic 頻道）
        source_type: official
        version: original
    note: 混血歌，旋律取自日本歌謠、由文夏填台語詞並演唱，1958年風行。唱離鄉打拼的遊子對母親的掛念，是1950–60年代城鄉遷移下最能打動人心的主題之一。日本原曲作曲者從缺不臆測。
    sources:
