# content/works.yaml — 作品掛鏈登記簿（2026-07-19 立，作品自動掛鏈基礎建設）
#
# 用途：人物頁與領域頁正文／作品清單中的《作品名》〈作品名〉，build 時由
#   scripts/build_pages.py 依本簿自動掛上外部連結（MD 正文一字不動）。
#   歌曲已有 content/songs/era-*.yaml 登記簿（title → listen[0]），本簿收
#   「歌曲登記簿以外」的作品：專輯、美術、書、電影、舞台／舞作等。
#
# 掛鏈優先序（scripts/build_pages.py 的 WorksLinker）：
#   1. 本簿帶 `pages` 限定且命中該頁 slug 的條目（同名異作消歧義用）
#   2. 本簿全域條目（無 pages 限定）
#   3. 全域歌名索引（era-*.yaml title → listen[0].url；同名取最早期別＝原唱）
#
# schema（每筆）：
#   title: ｜必｜比對用題名，「不含」書名號——正文的《title》與〈title〉都會命中
#   url:   ｜必｜外部連結。連結紀律照 docs/SONGS-SPEC.md §5 授權優先序：
#          official／archive／broadcaster／foundation 層級來源才收，個人帳號
#          上傳的完整作品不收；連結須直達單一作品頁，不收搜尋結果頁／歌單頁。
#   label: 選填，這條連結是什麼（誰的版本＋來源機構），供維護者與盲驗辨識。
#   type:  ｜必｜song｜album｜art｜book｜film｜play｜other
#   pages: 選填，頁 slug 陣列（人物頁 slug 或 field-* slug）——限定只在這些頁
#          掛鏈；省略＝全站通用。
#   note:  選填，一句話補充（版本考證、來源說明）。
#
# 維護流程：未命中清單看 _build/works-report.txt（每次 build 產生），後續批次
# 照它補條目；新增條目後跑 `python3 scripts/check_works.py` 驗 schema 與連結。

