<!DOCTYPE html>
<html lang="zh-Hant">
<!-- 參考模板：實際首頁由內容組生成後上傳 Drive html 夾（此檔不會被部署）。
     內容 HTML 引用樣式的路徑：首頁 assets/css/style.css、pages/ 底下 ../assets/css/style.css。 -->
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>臺灣人文藝術 — 人文與藝術資料庫</title>
  <meta name="description" content="教師備課用的臺灣人文藝術資料庫：以人物為入口，認識臺灣的文學、美術、音樂與表演藝術。">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-head">
    <h1>臺灣人文藝術</h1>
    <p>人文與藝術資料庫 · 教師備課用</p>
  </header>

  <!-- 「總論」「人物」「分領域」三個 tab（分領域 2026-07-18 上線）——
       「人物」tab 上方的領域篩選列（field-filters）維持雛形不動，
       chip 對應 #field-<tag> hash，篩的是「人物」tab 內的卡片；
       「分領域」tab 則是連到獨立 field-<slug>.html 頁的領域卡（build_field_cards() 生成）。
       外連 tab 用 <a>、內部 tab 用 <button data-tab>；JS 選擇器只抓 .geo-tab[data-tab]，
       外連不會被 hash 路由劫持（照 taiwan-geo-db 首頁同款做法）。 -->
  <nav class="geo-tabs" role="tablist" aria-label="首頁導覽">
    <button type="button" class="geo-tab" data-tab="general" role="tab" aria-selected="false">總論</button>
    <button type="button" class="geo-tab" data-tab="people" role="tab" aria-selected="false">人物</button>
    <button type="button" class="geo-tab" data-tab="fields" role="tab" aria-selected="false">分領域</button>
    <a class="geo-tab" href="https://taiwan.md/" target="_blank" rel="noopener" title="臺灣.md — AI 原生的台灣開源知識庫（外部網站）">臺灣.md ↗</a>
  </nav>

  <main>
    <!-- 總論 -->
    <section class="tab-panel" data-panel="general" role="tabpanel">
      <div class="general-intro">
        <p>這是一個給老師備課用的臺灣人文藝術資料庫，與「認識臺灣」地理資料庫成對。從一個一個具體的人出發——寫小說的、畫畫的、作曲的、演戲的——認識這片土地上的文學與藝術，並附可直接帶進課堂的教學素材與說書切分提示。</p>
        <a class="intro-cta" href="pages/overview.html">📖 總論——臺灣人文藝術的大脈絡</a>
        <p class="general-hint">或切到「人物」，從一個人的生命故事進入。</p>
      </div>
    </section>

    <!-- 人物 -->
    <section class="tab-panel" data-panel="people" role="tabpanel">
      <!-- 領域篩選列：「全部」＋出現過的領域（依人物 tags 出現順序去重）各一顆 chip。
           點擊由 JS 篩選下方卡片並把 hash 換成 #field-<tag>（「全部」回 #people）。 -->
      <div class="field-filters" role="group" aria-label="依領域篩選人物">
        <button type="button" class="field-chip active" data-field="all" aria-pressed="true">全部</button>
        <button type="button" class="field-chip" data-field="美術" aria-pressed="false">美術</button>
      </div>
      <div class="person-cards" id="person-cards">
        <!-- 每位人物一張卡；由內容組生成時逐一填入。data-tags＝frontmatter tags 空白分隔，
             供 JS 篩選比對（見下方 hash-router script） -->
        <a class="person-card" href="pages/FILL_ME-person-id.html" data-tags="美術">
          <span class="pc-name">〔姓名〕</span><span class="pc-years">〔1895–1947〕</span>
          <span class="pc-field">〔領域，如：文學 · 小說〕</span>
        </a>
      </div>
    </section>

    <!-- 分領域（Phase 2，2026-07-18 上線）：卡片自 content/fields/*.md 產生，
         每領域一張、連到 pages/field-<slug>.html；卡片樣式沿用人物卡。 -->
    <section class="tab-panel" data-panel="fields" role="tabpanel">
      <div class="person-cards" id="field-cards">
        <a class="person-card" href="pages/field-art.html">
          <span class="pc-name">〔領域名，如：美術〕</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    // 首頁分頁 hash 路由（#general / #people / #fields / #field-<領域>）。
    // #field-<領域>：進站或 hashchange 讀到 → 啟動「人物」tab＋套用該領域篩選；
    // 點篩選 chip 會把 hash 換成 #field-<領域>（「全部」回 #people）。
    // #fields（無連字號）＝獨立的「分領域」tab，與 #field-<領域> 篩選 hash 不衝突
    // （indexOf('field-') 對 'fields' 不命中，見下方 route()）。
    // 支援瀏覽器上一頁、深連結；照 taiwan-geo-db 首頁同款模式擴充。
    (function () {
      var TABS = ['general', 'people', 'fields'];
      var buttons = document.querySelectorAll('.geo-tab[data-tab]');
      var panels = document.querySelectorAll('.tab-panel');
      var fieldChips = document.querySelectorAll('.field-chip[data-field]');
      var cards = document.querySelectorAll('.person-card');

      function applyFilter(field) {
        fieldChips.forEach(function (c) {
          var on = c.getAttribute('data-field') === field;
          c.classList.toggle('active', on);
          c.setAttribute('aria-pressed', on ? 'true' : 'false');
        });
        cards.forEach(function (card) {
          var tags = (card.getAttribute('data-tags') || '').split(' ');
          card.style.display = (field === 'all' || tags.indexOf(field) > -1) ? '' : 'none';
        });
      }

      function activateTab(name) {
        if (TABS.indexOf(name) < 0) name = 'general';
        buttons.forEach(function (b) {
          var on = b.getAttribute('data-tab') === name;
          b.classList.toggle('active', on);
          b.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        panels.forEach(function (p) {
          p.classList.toggle('active', p.getAttribute('data-panel') === name);
        });
      }

      function route(hash, push) {
        var name = (hash || '').replace('#', '');
        var field = null;
        if (name.indexOf('field-') === 0) {
          field = name.slice('field-'.length);
          name = 'people';
        }
        activateTab(name);
        if (name === 'people') {
          applyFilter(field || 'all');
        }
        if (push) {
          var target = '#' + (field ? 'field-' + field : name);
          if (target !== location.hash) {
            history.pushState(null, '', target);
          }
        }
      }

      buttons.forEach(function (b) {
        b.addEventListener('click', function () { route(b.getAttribute('data-tab'), true); });
      });
      fieldChips.forEach(function (c) {
        c.addEventListener('click', function () {
          var field = c.getAttribute('data-field');
          route(field === 'all' ? 'people' : 'field-' + field, true);
        });
      });
      window.addEventListener('hashchange', function () {
        route(location.hash, false);
      });
      route(location.hash, false);
    })();
  </script>
</body>
</html>
